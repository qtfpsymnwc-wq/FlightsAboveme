<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>FlightsAboveMe — Kiosk</title>
  <link rel="stylesheet" href="./kiosk.css?v=279">
</head>
<body class="kiosk">
  <div id="app" class="kioskApp">
    <header class="topBar">
      <div class="appName"><img src="flightsaboveme-logo-tight.png?v=279" alt="FlightsAboveMe" class="siteLogo"></div>
      <a class="exitBtn" href="./index.html" aria-label="Exit kiosk mode">Exit</a>
    </header>

    <main class="board" aria-label="Flight kiosk display">
      <section class="topPane">
        <div class="logoPane">
          <img id="airlineLogo" class="logo hidden" alt="Airline logo" loading="lazy" />
        </div>
        <div class="mainText">
          <div id="airline" class="line airline">—</div>
          <div id="routeDisplay" class="line route hidden"></div>
          <div class="line sub">
            <span id="callsign" class="callsign">—</span>
            <span class="sep">•</span>
            <span id="model" class="model">—</span>
          </div>
          <div class="line tiny">
            <span class="tinyLabel">ICAO24</span>
            <span id="icao24" class="tinyValue">—</span>
          </div>
        </div>
      </section>

      <section class="bottomPane">
        <div class="statsGrid">
          <div class="stat"><div class="v" id="alt">—</div></div>
          <div class="stat"><div class="v" id="spd">—</div></div>
          <div class="stat"><div class="v" id="dir">—</div></div>
          <div class="stat"><div class="v" id="dist">—</div></div>
        </div>
        <div class="kioskExtras" aria-label="Phase and squawk">
          <span id="vs" class="xv">—</span>
          <span id="sqSep" class="xDot">•</span>
          <span id="squawk" class="xv">—</span>
        </div>
        
      </section>

      <section class="compatHidden" aria-hidden="true">
        <div id="route">—</div>
        <img id="airlineLogo2" class="hidden" alt="" />
        <div id="airline2">—</div>
        <div id="callsign2">—</div>
        <div id="route2">—</div>
        <div id="model2">—</div>
        <div id="icao242">—</div>
        <div id="alt2">—</div>
        <div id="spd2">—</div>
        <div id="dir2">—</div>
        <div id="dist2">—</div>
        <div id="vs2">—</div>
        <div id="squawk2">—</div>
      </section>
    </main>

    <div id="errBox" class="errBox hidden"></div>

    <section aria-label="Enter coordinates" class="zipGate hidden" id="locGate" role="form">
      <div class="zipGate__title">Set Location</div>
      <div class="zipGate__desc">Enter latitude and longitude for this kiosk display.</div>
      <div class="zipGate__row">
        <input aria-label="Latitude" class="zipGate__input" id="latInput" inputmode="decimal" placeholder="Latitude (e.g., 36.08)"/>
        <input aria-label="Longitude" class="zipGate__input" id="lonInput" inputmode="decimal" placeholder="Longitude (e.g., -94.24)"/>
        <button class="zipGate__btn" id="locBtn" type="button">Save</button>
        <button class="zipGate__btn" id="geoBtn" type="button">Use GPS</button>
        <button class="zipGate__btn" id="demoBtn" type="button">Demo</button>
      </div>
      <div aria-live="polite" class="zipGate__msg" id="locMsg"></div>
    </section>

    <button id="changeLoc" class="changeLoc" type="button" aria-label="Change location">change location</button>
  </div>

  <script>
    window.__KIOSK_MODE__ = true;
    (function() {
      const src = document.getElementById('route');
      const out = document.getElementById('routeDisplay');
      if (!src || !out) return;
      const sync = () => {
        const raw = (src.textContent || '').trim();
        out.textContent = raw || '';
        out.classList.toggle('hidden', !raw || raw === '—');
      };
      sync();
      const obs = new MutationObserver(sync);
      obs.observe(src, { childList: true, characterData: true, subtree: true });
    })();
  </script>
  <script src="./app.js?v=279"></script>
</body>
</html>
